<script>
$(function(){
	//#nav-toggleをクリックした時の設定
	$("#nav-toggle").on("click",function(){

		//ナビゲーションメニューを開閉
		$("nav ul").slideToggle();

		//#nav-toggleにクラス名[open]を追加・削除
		$(this).toggleClass("open");
	});
});
</script>
<script>
$(function() {
  var topBtn = $('.top');
  topBtn.hide();
  //スクロールが100に達したらボタン表示
  $(window).scroll(function () {
      if ($(this).scrollTop() > 100) {
          topBtn.fadeIn();
      } else {
          topBtn.fadeOut();
      }
  });
  //スクロールしてトップ
  topBtn.click(function () {
      $('body,html').animate({
          scrollTop: 0
      }, 500);
      return false;
  });
});
</script>
